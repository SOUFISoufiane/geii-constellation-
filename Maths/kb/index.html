<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Base — GEII Visual Toolbox</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>">
    <link rel="stylesheet" href="../shared/css/theme.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--void);
            color: var(--text-bright);
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-size: 15px;
            line-height: 1.65;
        }

        /* ─── SIDEBAR ─────────────────────────────────────────────── */
        #sidebar {
            width: 320px;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
            background: rgba(5, 5, 20, 0.55);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-right: 1px solid var(--rim);
            padding: 20px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .sb-brand {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            font-size: 0.95rem;
            color: var(--text-glow);
            text-shadow: 0 0 14px rgba(79,140,255,0.4);
            display: flex; align-items: center; gap: 8px;
        }
        .sb-back {
            display: inline-flex; align-items: center; gap: 6px;
            font-family: 'Space Mono', monospace;
            font-size: 0.78rem;
            color: var(--text-mid);
            text-decoration: none;
            padding: 6px 12px;
            border: 1px solid var(--rim);
            border-radius: 999px;
            width: fit-content;
            transition: all .15s;
        }
        .sb-back:hover { color: var(--accent-cyan); border-color: var(--accent-cyan);
            box-shadow: 0 0 12px rgba(0,245,212,0.25); }

        .sb-search {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--rim);
            border-radius: 999px;
            padding: 9px 16px;
            color: var(--text-bright);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition: all .15s;
        }
        .sb-search:focus { border-color: var(--accent-cyan);
            box-shadow: 0 0 14px rgba(0,245,212,0.2); }
        .sb-search::placeholder { color: var(--text-dim); }

        .sb-group-title {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin: 8px 4px 2px;
        }

        /* App bubble = one app, with its KBA + SOP nested */
        .app-card {
            border: 1px solid var(--rim);
            border-radius: 16px;
            padding: 10px 10px 8px;
            background: rgba(0,0,0,0.25);
            transition: border-color .15s, box-shadow .15s;
        }
        .app-card:hover { border-color: var(--app-accent, var(--accent-blue)); }
        .app-card-head {
            display: flex; align-items: center; gap: 9px;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 0.86rem;
            color: var(--app-accent, var(--text-bright));
            padding: 2px 4px 8px;
        }
        .app-card-head .ico { font-size: 1.1rem; filter: drop-shadow(0 0 6px var(--app-accent)); }

        .kb-pill {
            display: flex; align-items: center; gap: 8px;
            margin: 3px 0;
            padding: 7px 12px;
            border-radius: 11px;
            color: var(--text-mid);
            font-size: 0.82rem;
            cursor: pointer;
            text-decoration: none;
            transition: all .13s;
            border: 1px solid transparent;
        }
        .kb-pill:hover { background: rgba(255,255,255,0.05); color: var(--text-bright); }
        .kb-pill.active {
            background: color-mix(in srgb, var(--app-accent) 18%, transparent);
            color: var(--text-glow);
            border-color: var(--app-accent);
        }
        .kb-pill .tag {
            font-family: 'Space Mono', monospace;
            font-size: 0.62rem;
            letter-spacing: 0.08em;
            padding: 1px 6px;
            border-radius: 999px;
            border: 1px solid currentColor;
            opacity: 0.7;
            flex-shrink: 0;
        }
        .kb-pill .pill-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* ─── CONTENT ─────────────────────────────────────────────── */
        #content-area {
            flex-grow: 1;
            position: relative;
            z-index: 10;
            overflow-y: auto;
            padding: 0;
        }
        .content-inner {
            max-width: 760px;
            margin: 0 auto;
            padding: 48px 48px 96px;
        }

        /* Welcome / home state */
        .kb-welcome { text-align: center; padding-top: 8vh; }
        .kb-welcome .big {
            font-family: 'Space Mono', monospace;
            font-size: 2.1rem;
            font-weight: 700;
            color: var(--text-glow);
            text-shadow: 0 0 24px rgba(79,140,255,0.4);
            letter-spacing: 0.04em;
        }
        .kb-welcome .lede { color: var(--text-mid); margin-top: 10px; font-size: 1rem; }
        .kb-cards {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(190px,1fr));
            gap: 14px; margin-top: 40px; text-align: left;
        }
        .kb-hub-card {
            border: 1px solid var(--rim); border-radius: 18px; padding: 18px;
            background: rgba(0,0,0,0.3); cursor: pointer; transition: all .16s;
            text-decoration: none; display: block;
        }
        .kb-hub-card:hover { transform: translateY(-3px);
            border-color: var(--app-accent); box-shadow: 0 8px 30px rgba(0,0,0,0.5),
            0 0 20px color-mix(in srgb, var(--app-accent) 30%, transparent); }
        .kb-hub-card .ico { font-size: 1.8rem; filter: drop-shadow(0 0 8px var(--app-accent)); }
        .kb-hub-card .name { font-family:'Space Mono',monospace; font-weight:700;
            color: var(--app-accent); margin-top: 8px; font-size: 0.95rem; }
        .kb-hub-card .desc { color: var(--text-mid); font-size: 0.8rem; margin-top: 4px; }

        /* Breadcrumb + article header */
        .crumb {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            font-family: 'Space Mono', monospace; font-size: 0.74rem;
            color: var(--text-dim); margin-bottom: 22px;
        }
        .crumb .sep { opacity: 0.5; }
        .crumb .app-chip {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 3px 10px; border-radius: 999px;
            border: 1px solid var(--app-accent); color: var(--app-accent);
        }
        .open-app-btn {
            margin-left: auto;
            display: inline-flex; align-items: center; gap: 7px;
            padding: 7px 16px; border-radius: 999px;
            background: color-mix(in srgb, var(--app-accent) 16%, transparent);
            border: 1px solid var(--app-accent); color: var(--app-accent);
            font-family: 'Space Mono', monospace; font-size: 0.76rem;
            text-decoration: none; transition: all .15s;
        }
        .open-app-btn:hover { background: color-mix(in srgb, var(--app-accent) 30%, transparent);
            box-shadow: 0 0 16px color-mix(in srgb, var(--app-accent) 40%, transparent); }

        /* Markdown body */
        #md { animation: fade .25s ease; }
        @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
        #md h1 { font-family:'Space Mono',monospace; font-size: 1.9rem; color: var(--text-glow);
            margin: 0 0 8px; letter-spacing: 0.01em; line-height: 1.25; }
        #md h2 { font-family:'Space Mono',monospace; font-size: 1.12rem; color: var(--app-accent, var(--accent-blue));
            margin: 32px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--rim); }
        #md h3 { font-size: 1rem; color: var(--text-bright); margin: 22px 0 8px; }
        #md p, #md li { color: var(--text-bright); }
        #md ul, #md ol { padding-left: 22px; }
        #md li { margin: 5px 0; }
        #md code {
            font-family:'JetBrains Mono','Space Mono',monospace; font-size: 0.85em;
            background: rgba(0,245,212,0.08); color: var(--accent-cyan);
            padding: 2px 6px; border-radius: 6px; border: 1px solid rgba(0,245,212,0.15);
        }
        #md pre {
            background: #05050f; border: 1px solid var(--rim); border-radius: 12px;
            padding: 16px; overflow-x: auto;
        }
        #md pre code { background: none; border: none; color: var(--text-bright); padding: 0; }
        #md table { border-collapse: collapse; width: 100%; margin: 14px 0;
            font-size: 0.86rem; border-radius: 10px; overflow: hidden; }
        #md th, #md td { border: 1px solid var(--rim); padding: 8px 12px; text-align: left; }
        #md th { background: rgba(255,255,255,0.05); font-family:'Space Mono',monospace;
            color: var(--text-mid); font-size: 0.78rem; }
        #md a { color: var(--accent-cyan); text-decoration: none; border-bottom: 1px dashed rgba(0,245,212,0.4); }
        #md a:hover { border-bottom-style: solid; }

        /* Teleport chip — auto-linked app/feature mentions */
        .xref {
            cursor: pointer; color: var(--xref-accent, var(--accent-purple));
            border-bottom: 1px dotted currentColor; font-weight: 500;
            transition: all .12s; padding: 0 1px; border-radius: 3px;
        }
        .xref:hover { background: color-mix(in srgb, var(--xref-accent) 18%, transparent);
            border-bottom-style: solid; }

        /* scrollbars */
        ::-webkit-scrollbar { width: 9px; }
        ::-webkit-scrollbar-thumb { background: var(--rim); border-radius: 6px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--rim-bright); }

        @media (max-width: 760px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            #sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--rim); }
            .content-inner { padding: 28px 20px 64px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>
    <div class="hud-scanlines"></div>
    <div class="vignette"></div>

    <aside id="sidebar">
        <div class="sb-brand">📚 Knowledge Base</div>
        <a class="sb-back" href="../index.html">← Retour à la galaxie</a>
        <input class="sb-search" id="search" type="text" placeholder="Rechercher un article, une app…" autocomplete="off">
        <div id="nav"></div>
    </aside>

    <main id="content-area">
        <div class="content-inner">
            <div id="home"></div>
            <div id="article" style="display:none">
                <div class="crumb" id="crumb"></div>
                <div id="md"></div>
            </div>
        </div>
    </main>

    <script type="module">
        // ── Registry: one entry per app, with its accent, icon, live app path,
        //    its KBA + SOP, and the aliases that should auto-link to it. ──────
        const APPS = [
            { id:'signal-observatory', name:'Signal Observatory', icon:'🌌', accent:'var(--accent-blue)',
              app:'../apps/signal-observatory/index.html',
              kba:'kbas/KB05050001_signal-observatory_sine-wave_v1.0.md',
              sop:'sops/SOP_signal-observatory_v1.0.md',
              aliases:['Signal Observatory','signal observatory','fusion mode','fusion modes','Parseval','STFT','Bode pur','Nyquist'] },
            { id:'automatique', name:'Servo Lab', icon:'⟲', accent:'var(--accent-gold)',
              app:'../apps/automatique/index.html',
              kba:'kbas/KB01050001_automatique_overview_v1.0.md',
              sop:'sops/SOP_automatique_v1.0.md',
              aliases:['Servo Lab','automatique','Automatique','PID','root locus','lieu des racines','Bode','marges'] },
            { id:'circuits', name:'Circuits Interactifs', icon:'⚡', accent:'var(--accent-red)',
              app:'../apps/circuits/index.html',
              kba:'kbas/KB02050001_circuits_schematic-editor_v1.0.md',
              sop:'sops/SOP_circuits_v1.0.md',
              aliases:['Circuits Interactifs','Circuits','circuits','RLC','Kirchhoff','Thévenin','Thevenin'] },
            { id:'numerique', name:'Digital Lab', icon:'01', accent:'var(--accent-green)',
              app:'../apps/numerique/index.html',
              kba:'kbas/KB04050001_numerique_logic-gates_v1.0.md',
              sop:'sops/SOP_numerique_v1.0.md',
              aliases:['Digital Lab','Numérique','numerique','Karnaugh','VHDL','table de vérité','truth table','Quine'] },
            { id:'maths', name:'Math Visualizer', icon:'∫', accent:'var(--accent-purple)',
              app:'../apps/maths/index.html',
              kba:'kbas/KB03050001_maths_calculator_v1.0.md',
              sop:'sops/SOP_maths_v1.0.md',
              aliases:['Math Visualizer','Maths','EDO','RK4','Runge','Laplace','surface 3D','pôles-zéros','pole-zero'] },
            { id:'robotique', name:'Robotique', icon:'🦾', accent:'var(--accent-cyan)',
              app:'../apps/robotique/index.html',
              kba:'kbas/KB06050001_robotique_kinematics_v1.0.md',
              sop:'sops/SOP_robotique_v1.0.md',
              aliases:['Robotique','robotique','cinématique','kinematics','VAL3','trsf','compose','appro','setFrame',
                       'transformation homogène','transformations homogènes','MGD','MGI','singularité','singularités','bras 2R','bras 6 axes'] },
        ];
        const GLOBAL_SOP = { id:'global', name:'Global / Plateforme', icon:'🌐', accent:'var(--accent-blue)',
              app:null, sop:'sops/SOP_global_v1.0.md',
              aliases:['toolbox','plateforme','galaxie','manifest','dev_server','renderPlot','plot-fit'] };

        // Build a flat article index: id → {path, title, kind, app}
        const ARTICLES = {};
        function reg(path, title, kind, app){ if(path) ARTICLES[path] = { path, title, kind, app }; }
        APPS.forEach(a => { reg(a.kba, a.name+' — Guide', 'KBA', a); reg(a.sop, a.name+' — SOP', 'SOP', a); });
        reg(GLOBAL_SOP.sop, 'Plateforme — SOP', 'SOP', GLOBAL_SOP);

        // Alias → first matching article path (KBA preferred over SOP), longest aliases first.
        const ALIAS_MAP = [];
        [...APPS, GLOBAL_SOP].forEach(a => {
            const target = a.kba || a.sop;
            (a.aliases||[]).forEach(al => ALIAS_MAP.push({ alias: al, path: target, accent: a.accent }));
            // Explicit cross-refs in articles: KB code → its KBA, SOP filename → its SOP.
            if (a.kba) {
                const code = a.kba.match(/KB\d+/);          // e.g. KB05050001
                if (code) ALIAS_MAP.push({ alias: code[0], path: a.kba, accent: a.accent });
            }
            if (a.sop) {
                const sopName = a.sop.split('/').pop().replace('.md','');  // SOP_maths_v1.0
                ALIAS_MAP.push({ alias: sopName, path: a.sop, accent: a.accent });
            }
        });
        ALIAS_MAP.sort((x,y) => y.alias.length - x.alias.length);

        // ── Sidebar ────────────────────────────────────────────────
        const nav = document.getElementById('nav');
        function buildNav() {
            nav.innerHTML = '';
            const t = document.createElement('div'); t.className='sb-group-title'; t.textContent='Applications';
            nav.appendChild(t);
            APPS.forEach(a => {
                const card = document.createElement('div');
                card.className = 'app-card'; card.style.setProperty('--app-accent', a.accent);
                card.dataset.search = (a.name+' '+a.aliases.join(' ')).toLowerCase();
                card.innerHTML = `<div class="app-card-head"><span class="ico">${a.icon}</span>${a.name}</div>`;
                card.appendChild(pill(a.kba, 'Guide', 'KBA'));
                card.appendChild(pill(a.sop, 'SOP', 'SOP'));
                nav.appendChild(card);
            });
            const t2 = document.createElement('div'); t2.className='sb-group-title'; t2.textContent='Plateforme';
            nav.appendChild(t2);
            const gcard = document.createElement('div');
            gcard.className='app-card'; gcard.style.setProperty('--app-accent', GLOBAL_SOP.accent);
            gcard.dataset.search = 'global plateforme '+GLOBAL_SOP.aliases.join(' ');
            gcard.innerHTML = `<div class="app-card-head"><span class="ico">${GLOBAL_SOP.icon}</span>${GLOBAL_SOP.name}</div>`;
            gcard.appendChild(pill(GLOBAL_SOP.sop, 'SOP', 'SOP'));
            nav.appendChild(gcard);
        }
        function pill(path, label, tag) {
            const a = document.createElement('a');
            a.className = 'kb-pill'; a.dataset.path = path;
            a.innerHTML = `<span class="tag">${tag}</span><span class="pill-label">${label}</span>`;
            a.href = '#' + path;
            return a;
        }

        // ── Home hub ───────────────────────────────────────────────
        function buildHome() {
            const h = document.getElementById('home');
            h.innerHTML = `
              <div class="kb-welcome">
                <div class="big">Base de connaissances</div>
                <div class="lede">Guides d'utilisation (KBA) et procédures (SOP) pour chaque app de la toolbox.<br>
                Choisis une app, ou clique sur n'importe quelle mention pour t'y téléporter.</div>
              </div>
              <div class="kb-cards">
                ${APPS.map(a => `
                  <a class="kb-hub-card" style="--app-accent:${a.accent}" href="#${a.kba}">
                    <div class="ico">${a.icon}</div>
                    <div class="name">${a.name}</div>
                    <div class="desc">Guide + SOP</div>
                  </a>`).join('')}
              </div>`;
        }

        // ── Auto-linker: turn app/feature mentions into teleport chips ─
        function linkify(rootEl, currentPath) {
            const walker = document.createTreeWalker(rootEl, NodeFilter.SHOW_TEXT, {
                acceptNode(node) {
                    const p = node.parentElement;
                    if (!p) return NodeFilter.FILTER_REJECT;
                    // skip code, headings, existing links, the article's own H1
                    if (p.closest('code,pre,a,.xref,h1')) return NodeFilter.FILTER_REJECT;
                    return NodeFilter.FILTER_ACCEPT;
                }
            });
            const targets = [];
            while (walker.nextNode()) targets.push(walker.currentNode);
            // build one regex of all aliases (escaped), longest first
            const escaped = ALIAS_MAP.map(m => m.alias.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
            const re = new RegExp('\\b(' + escaped.join('|') + ')\\b', 'g');
            targets.forEach(node => {
                const text = node.nodeValue;
                if (!re.test(text)) return;
                re.lastIndex = 0;
                const frag = document.createDocumentFragment();
                let last = 0, m;
                const seen = new Set();   // link each alias at most once per text node
                while ((m = re.exec(text)) !== null) {
                    const entry = ALIAS_MAP.find(a => a.alias === m[0]);
                    if (!entry || entry.path === currentPath || seen.has(entry.path)) continue;
                    seen.add(entry.path);
                    if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
                    const span = document.createElement('span');
                    span.className = 'xref'; span.textContent = m[0];
                    span.style.setProperty('--xref-accent', entry.accent);
                    span.title = 'Aller à : ' + (ARTICLES[entry.path]?.title || entry.path);
                    span.onclick = () => { location.hash = entry.path; };
                    frag.appendChild(span);
                    last = m.index + m[0].length;
                }
                if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
                if (last > 0) node.parentNode.replaceChild(frag, node);
            });
        }

        // ── Load + render an article ───────────────────────────────
        async function loadArticle(path) {
            const meta = ARTICLES[path];
            document.getElementById('home').style.display = 'none';
            document.getElementById('article').style.display = '';
            const app = meta?.app;
            document.documentElement.style.setProperty('--app-accent', app?.accent || 'var(--accent-blue)');
            // crumb
            const crumb = document.getElementById('crumb');
            crumb.style.setProperty('--app-accent', app?.accent || 'var(--accent-blue)');
            crumb.innerHTML = `<a class="sb-back" href="#" style="padding:2px 10px">Accueil KB</a>
                <span class="sep">›</span>
                ${app ? `<span class="app-chip">${app.icon} ${app.name}</span>` : ''}
                <span class="sep">›</span><span>${meta?.kind || ''}</span>
                ${app?.app ? `<a class="open-app-btn" href="${app.app}">${app.icon} Ouvrir l'app →</a>` : ''}`;
            const md = document.getElementById('md');
            try {
                const r = await fetch(path);
                if (!r.ok) throw new Error('HTTP '+r.status);
                const text = await r.text();
                md.innerHTML = marked.parse(text);
                linkify(md, path);
                if (window.renderMathInElement) renderMathInElement(md, {
                    delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],
                    throwOnError:false });
            } catch(e) {
                md.innerHTML = `<p style="color:var(--accent-red)">Impossible de charger « ${path} » (${e.message}).</p>`;
            }
            // active pill
            document.querySelectorAll('.kb-pill').forEach(p =>
                p.classList.toggle('active', p.dataset.path === path));
            document.getElementById('content-area').scrollTop = 0;
        }

        function route() {
            const hash = decodeURIComponent(location.hash.slice(1));
            if (hash && ARTICLES[hash]) loadArticle(hash);
            else {
                document.getElementById('article').style.display = 'none';
                document.getElementById('home').style.display = '';
                document.documentElement.style.setProperty('--app-accent', 'var(--accent-blue)');
                document.querySelectorAll('.kb-pill').forEach(p => p.classList.remove('active'));
            }
        }

        // ── Search ─────────────────────────────────────────────────
        document.getElementById('search').addEventListener('input', e => {
            const q = e.target.value.trim().toLowerCase();
            document.querySelectorAll('.app-card').forEach(card => {
                card.style.display = (!q || card.dataset.search.includes(q)) ? '' : 'none';
            });
        });

        buildNav();
        buildHome();
        window.addEventListener('hashchange', route);
        route();
    </script>
</body>
</html>

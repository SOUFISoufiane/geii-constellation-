<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuits Interactifs — GEII Toolbox</title>

    <link rel="stylesheet" href="../../shared/css/theme.css">
    <link rel="stylesheet" href="../../shared/css/toolbox.css">
    <script>
        document.querySelectorAll('link[rel="stylesheet"]').forEach(l => {
            const h = l.getAttribute('href');
            if (h && !h.startsWith('http')) l.href = h + '?v=' + Date.now();
        });
    </script>
    <style>
        body { display: flex; flex-direction: column; padding-top: var(--app-header-h, 36px); }
        .hud-scanlines, .vignette { position: fixed; inset: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div class="hud-scanlines"></div>
    <div class="vignette"></div>

    <script type="module">
        const v = Date.now();
        const { mountAppHeader } = await import(`../../shared/js/app-header.js?v=${v}`);
        const { renderStub } = await import(`../../shared/js/stub-render.js?v=${v}`);
        mountAppHeader('circuits');
        renderStub('circuits', [
            'Schémas interactifs en SVG (résistances, condensateurs, inductances, sources)',
            'Calcul live de tensions/courants par les lois de Kirchhoff',
            'Visualisation des théorèmes de Thévenin / Norton avec étapes',
            'Réponse temporelle d’un RLC (sliders L, C, R) → tracé voltage(t)',
            'Modes guidés : DC stationnaire · AC sinusoïdal · transitoire',
            'Quiz auto-générés : trouver tension / courant manquant',
            'Export du schéma + équations en PDF / PNG pour TP'
        ]);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servo Lab — GEII Toolbox</title>

    <link rel="stylesheet" href="../../shared/css/theme.css">
    <link rel="stylesheet" href="../../shared/css/toolbox.css">
    <script>
        document.querySelectorAll('link[rel="stylesheet"]').forEach(l => {
            const h = l.getAttribute('href');
            if (h && !h.startsWith('http')) l.href = h + '?v=' + Date.now();
        });
    </script>
    <style>
        body { display: flex; flex-direction: column; padding-top: var(--app-header-h, 36px); }
        .hud-scanlines, .vignette { position: fixed; inset: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div class="hud-scanlines"></div>
    <div class="vignette"></div>

    <script type="module">
        const v = Date.now();
        const { mountAppHeader } = await import(`../../shared/js/app-header.js?v=${v}`);
        const { renderStub } = await import(`../../shared/js/stub-render.js?v=${v}`);
        mountAppHeader('automatique');
        renderStub('automatique', [
            'PID interactif sur plant 2nd ordre (sliders Kp, Ki, Kd) → réponse indicielle live',
            'Lieu des racines (root locus) avec déplacement des pôles à la souris',
            'Diagrammes de Bode / Nyquist du système bouclé',
            'Calcul automatique des marges de gain & phase',
            'Comparaison feedforward / feedback / cascade',
            'Modes pédagogiques : pôle dominant · effet du dérivateur · saturation',
            'Identification visuelle d’une fonction de transfert à partir d’une réponse'
        ]);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Visualizer — GEII Visual Toolbox</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="../../shared/css/theme.css">
    <link rel="stylesheet" href="../../shared/css/toolbox.css">
    <style>
        body { padding-top: 50px; display: flex; flex-direction: column; overflow: hidden; height: 100vh; }
        .hud-scanlines, .vignette { position: fixed; inset: 0; pointer-events: none; }

        .tabbar { display: flex; gap: 4px; padding: 0.5rem 1rem 0; position: relative; z-index: 10; }
        .tab { background: rgba(0,0,0,0.4); border: 1px solid var(--rim); border-bottom: none;
               color: var(--text-mid); padding: 8px 18px; border-radius: 8px 8px 0 0; cursor: pointer;
               font-family: 'Space Mono', monospace; font-size: 0.85rem; }
        .tab.active { background: rgba(0,0,0,0.6); color: var(--accent-purple); border-color: var(--accent-purple); }

        .dashboard { display: flex; flex: 1; min-height: 0; padding: 1rem; gap: 1rem; position: relative; z-index: 10; }
        .controls { width: 320px; background: rgba(0,0,0,0.5); border: 1px solid var(--rim); padding: 1rem;
                    border-radius: 8px; display: flex; flex-direction: column; gap: 0.6rem; overflow-y: auto; }
        .stage { flex: 1; display: flex; flex-direction: column; gap: 1rem; min-width: 0; }
        .plot-container { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid var(--rim);
                          border-radius: 8px; overflow: hidden; min-height: 0; }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .control-group label { color: var(--text-mid); font-size: 0.8rem; font-family: 'Space Mono', monospace; }
        .control-group input[type="range"] { accent-color: var(--accent-purple); }
        .control-group input[type="text"], select { background: rgba(0,0,0,0.4); border: 1px solid var(--rim);
                    color: var(--text-bright); padding: 6px; border-radius: 4px; font-family: 'Space Mono', monospace; }
        .control-group span.val { color: var(--accent-purple); font-weight: bold; }
        h2.panel-title { margin: 0; color: var(--accent-purple); font-size: 1.1rem; }
        .hint { color: var(--text-dim); font-size: 0.75rem; }
        .err { color: var(--accent-red); font-size: 0.8rem; min-height: 1em; }
        .module { display: none; flex: 1; min-height: 0; }
        .module.active { display: flex; }
        .steps { background: rgba(0,0,0,0.45); border: 1px solid var(--accent-purple); border-radius: 8px;
                 padding: 1rem; overflow-y: auto; max-height: 45%; }
        .steps .step { margin-bottom: 0.8rem; padding-bottom: 0.8rem; border-bottom: 1px solid var(--rim); }
        .steps .step:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .steps .lbl { color: var(--text-dim); font-size: 0.75rem; font-family: 'Space Mono', monospace; margin-bottom: 4px; }
        button.go { background: transparent; border: 1px solid var(--accent-purple); color: var(--accent-purple);
                    padding: 8px; border-radius: 6px; cursor: pointer; font-family: 'Space Mono', monospace; }
    </style>
</head>
<body>
    <div class="hud-scanlines"></div>
    <div class="vignette"></div>

    <script type="module">
        const { mountAppHeader } = await import(`../../shared/js/app-header.js?v=${Date.now()}`);
        mountAppHeader('maths');
    </script>

    <div class="tabbar">
        <button class="tab active" data-tab="surface">🌐 Surface 3D</button>
        <button class="tab" data-tab="ode">📉 EDO (RK4)</button>
        <button class="tab" data-tab="laplace">∫ Laplace</button>
    </div>

    <!-- ═══════════════ SURFACE 3D ═══════════════ -->
    <div class="dashboard module active" id="mod-surface">
        <div class="controls">
            <h2 class="panel-title">🌐 Traceur de surface z=f(x,y)</h2>
            <p class="hint">Saisis une expression JavaScript en x et y.</p>
            <div class="control-group"><label>f(x, y) =</label>
                <input type="text" id="func-input" value="Math.sin(x)*Math.cos(y)"></div>
            <div class="control-group"><label>Domaine ± :</label>
                <input type="text" id="range-input" value="5"></div>
            <button class="go" id="btn-plot">Tracer</button>
            <div class="err" id="error-msg"></div>
        </div>
        <div class="stage"><div class="plot-container"><div id="plot-surface" style="width:100%;height:100%;"></div></div></div>
    </div>

    <!-- ═══════════════ ODE (RK4) ═══════════════ -->
    <div class="dashboard module" id="mod-ode">
        <div class="controls">
            <h2 class="panel-title">📉 EDO du 2nd ordre (RK4)</h2>
            <p class="hint">a·y'' + b·y' + c·y = f(t), résolue par Runge–Kutta 4.</p>
            <div class="control-group"><label>a (y''): <span class="val" id="val-ode-a">1</span></label>
                <input type="range" id="ode-a" min="0.2" max="5" step="0.1" value="1"></div>
            <div class="control-group"><label>b (y'): <span class="val" id="val-ode-b">0.5</span></label>
                <input type="range" id="ode-b" min="0" max="5" step="0.1" value="0.5"></div>
            <div class="control-group"><label>c (y): <span class="val" id="val-ode-c">1</span></label>
                <input type="range" id="ode-c" min="0" max="10" step="0.1" value="1"></div>
            <div class="control-group"><label>Forçage f(t):</label>
                <select id="ode-force">
                    <option value="0">0 (libre)</option>
                    <option value="1" selected>1 (échelon)</option>
                    <option value="Math.sin(t)">sin(t)</option>
                </select></div>
            <div class="control-group"><label>y(0): <span class="val" id="val-ode-y0">0</span></label>
                <input type="range" id="ode-y0" min="-2" max="2" step="0.1" value="0"></div>
            <div class="control-group"><label>y'(0): <span class="val" id="val-ode-v0">0</span></label>
                <input type="range" id="ode-v0" min="-2" max="2" step="0.1" value="0"></div>
            <div id="ode-info" class="hint"></div>
        </div>
        <div class="stage"><div class="plot-container"><div id="plot-ode" style="width:100%;height:100%;"></div></div></div>
    </div>

    <!-- ═══════════════ LAPLACE ═══════════════ -->
    <div class="dashboard module" id="mod-laplace">
        <div class="controls">
            <h2 class="panel-title">∫ Transformée de Laplace</h2>
            <p class="hint">Transformation pas-à-pas par table, avec tracé pôles-zéros de F(s).</p>
            <div class="control-group"><label>Signal f(t):</label>
                <select id="lap-fn">
                    <option value="step">Échelon u(t)</option>
                    <option value="ramp">Rampe t·u(t)</option>
                    <option value="exp" selected>Exponentielle e^(−at)</option>
                    <option value="sin">Sinus sin(ωt)</option>
                    <option value="cos">Cosinus cos(ωt)</option>
                    <option value="expsin">e^(−at)·sin(ωt)</option>
                </select></div>
            <div class="control-group"><label>a: <span class="val" id="val-lap-a">1</span></label>
                <input type="range" id="lap-a" min="0.2" max="5" step="0.1" value="1"></div>
            <div class="control-group"><label>ω: <span class="val" id="val-lap-w">2</span></label>
                <input type="range" id="lap-w" min="0.5" max="10" step="0.1" value="2"></div>
        </div>
        <div class="stage">
            <div class="steps" id="lap-steps"></div>
            <div class="plot-container"><div id="plot-lap" style="width:100%;height:100%;"></div></div>
        </div>
    </div>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
